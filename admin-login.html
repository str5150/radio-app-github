<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radio App - 管理者ログイン</title>
    <link rel="icon" type="image/png" href="icons/icon-96x96.png">
    <link rel="apple-touch-icon" href="icons/icon-152x152.png">
    <link rel="icon" sizes="192x192" href="icons/icon-192x192.png">
    <link rel="icon" sizes="512x512" href="icons/icon-512x512.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
        }

        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .login-title {
            font-size: 1.5rem;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 0.5rem;
        }

        .login-subtitle {
            color: #666;
            font-size: 0.9rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: #333;
        }

        .form-input {
            width: 100%;
            padding: 0.75rem;
            border: 2px solid #e5e5e5;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.2s ease;
        }

        .form-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .login-btn {
            width: 100%;
            padding: 0.75rem;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }

        .login-btn:hover {
            background: #5a6fd8;
        }

        .login-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .error-message {
            color: #e74c3c;
            font-size: 0.9rem;
            margin-top: 0.75rem;
            display: none;
        }

        .success-message {
            color: #27ae60;
            font-size: 0.9rem;
            margin-top: 0.75rem;
            display: none;
        }

        .sub-action {
            text-align: center;
            margin-top: 1.25rem;
        }

        .sub-action a {
            color: #667eea;
            text-decoration: none;
            font-size: 0.85rem;
            cursor: pointer;
        }

        .sub-action a:hover {
            text-decoration: underline;
        }

        .form-divider {
            border-top: 1px solid #eee;
            margin: 1.5rem 0;
        }

        .section-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 1.25rem;
            text-align: center;
        }

        .back-link {
            text-align: center;
            margin-top: 1.5rem;
        }

        .back-link a {
            color: #667eea;
            text-decoration: none;
            font-size: 0.9rem;
        }

        .back-link a:hover {
            text-decoration: underline;
        }

        .loading {
            display: none;
            text-align: center;
            margin-top: 1rem;
        }

        .spinner {
            border: 2px solid #f3f3f3;
            border-top: 2px solid #667eea;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1 class="login-title">管理者ログイン</h1>
            <p class="login-subtitle">Radio App 管理システム</p>
        </div>

        <!-- ログインフォーム -->
        <form id="loginForm">
            <div class="form-group">
                <label for="password" class="form-label">パスワード</label>
                <input type="password" id="password" class="form-input" autocomplete="current-password" required>
            </div>

            <button type="submit" class="login-btn" id="loginBtn">ログイン</button>

            <div class="error-message" id="errorMessage"></div>

            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>ログイン中...</p>
            </div>
        </form>

        <div class="sub-action">
            <a id="toggleChangePw">パスワードを変更する</a>
        </div>

        <!-- パスワード変更フォーム（初期は非表示） -->
        <form id="changePwForm" style="display:none;">
            <div class="form-divider"></div>
            <h2 class="section-title">パスワード変更</h2>

            <div class="form-group">
                <label for="currentPw" class="form-label">現在のパスワード</label>
                <input type="password" id="currentPw" class="form-input" autocomplete="current-password" required>
            </div>

            <div class="form-group">
                <label for="newPw" class="form-label">新しいパスワード（8文字以上）</label>
                <input type="password" id="newPw" class="form-input" autocomplete="new-password" required>
            </div>

            <div class="form-group">
                <label for="newPw2" class="form-label">新しいパスワード（確認）</label>
                <input type="password" id="newPw2" class="form-input" autocomplete="new-password" required>
            </div>

            <button type="submit" class="login-btn" id="changePwBtn">変更する</button>

            <div class="error-message" id="changePwError"></div>
            <div class="success-message" id="changePwSuccess"></div>
        </form>

        <div class="back-link">
            <a href="index.html">← リスナーアプリに戻る</a>
        </div>
    </div>

    <script>
        // Cloudflare Worker（認証・KV保存）のエンドポイント
        const WORKER_URL = 'https://radio-app-r2-uploader.str-radio.workers.dev';

        class AdminLogin {
            constructor() {
                this.form = document.getElementById('loginForm');
                this.passwordInput = document.getElementById('password');
                this.loginBtn = document.getElementById('loginBtn');
                this.errorMessage = document.getElementById('errorMessage');
                this.loading = document.getElementById('loading');

                this.changePwForm = document.getElementById('changePwForm');
                this.toggleChangePw = document.getElementById('toggleChangePw');

                this.init();
            }

            init() {
                this.form.addEventListener('submit', (e) => this.handleLogin(e));
                this.changePwForm.addEventListener('submit', (e) => this.handleChangePassword(e));
                this.toggleChangePw.addEventListener('click', (e) => {
                    e.preventDefault();
                    const showing = this.changePwForm.style.display !== 'none';
                    this.changePwForm.style.display = showing ? 'none' : 'block';
                    this.toggleChangePw.textContent = showing ? 'パスワードを変更する' : '変更をやめる';
                });
            }

            async handleLogin(e) {
                e.preventDefault();

                const password = this.passwordInput.value;
                if (!password) {
                    this.showError('パスワードを入力してください。');
                    return;
                }

                this.showLoading(true);

                try {
                    const res = await fetch(WORKER_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'X-Action': 'admin_login' },
                        body: JSON.stringify({ password })
                    });
                    const data = await res.json().catch(() => ({}));

                    if (!res.ok || !data.success) {
                        throw new Error(data.error || 'ログインに失敗しました。');
                    }

                    // 署名トークンを保存してダッシュボードへ
                    sessionStorage.setItem('adminToken', data.token);
                    sessionStorage.setItem('adminLoggedIn', 'true');
                    window.location.href = 'admin-dashboard.html';

                } catch (err) {
                    this.showError(err.message || 'ログインに失敗しました。');
                } finally {
                    this.showLoading(false);
                }
            }

            async handleChangePassword(e) {
                e.preventDefault();

                const currentPassword = document.getElementById('currentPw').value;
                const newPassword = document.getElementById('newPw').value;
                const newPassword2 = document.getElementById('newPw2').value;
                const errEl = document.getElementById('changePwError');
                const okEl = document.getElementById('changePwSuccess');
                errEl.style.display = 'none';
                okEl.style.display = 'none';

                if (!currentPassword || !newPassword) {
                    this.showFieldError(errEl, '現在のパスワードと新しいパスワードを入力してください。');
                    return;
                }
                if (newPassword.length < 8) {
                    this.showFieldError(errEl, '新しいパスワードは8文字以上にしてください。');
                    return;
                }
                if (newPassword !== newPassword2) {
                    this.showFieldError(errEl, '新しいパスワード（確認）が一致しません。');
                    return;
                }

                const btn = document.getElementById('changePwBtn');
                btn.disabled = true;

                try {
                    const res = await fetch(WORKER_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'X-Action': 'admin_change_password' },
                        body: JSON.stringify({ currentPassword, newPassword })
                    });
                    const data = await res.json().catch(() => ({}));

                    if (!res.ok || !data.success) {
                        throw new Error(data.error || 'パスワード変更に失敗しました。');
                    }

                    okEl.textContent = 'パスワードを変更しました。新しいパスワードでログインしてください。';
                    okEl.style.display = 'block';
                    this.changePwForm.reset();

                } catch (err) {
                    this.showFieldError(errEl, err.message || 'パスワード変更に失敗しました。');
                } finally {
                    btn.disabled = false;
                }
            }

            showFieldError(el, message) {
                el.textContent = message;
                el.style.display = 'block';
            }

            showLoading(show) {
                this.loading.style.display = show ? 'block' : 'none';
                this.loginBtn.disabled = show;
            }

            showError(message) {
                this.errorMessage.textContent = message;
                this.errorMessage.style.display = 'block';
                setTimeout(() => {
                    this.errorMessage.style.display = 'none';
                }, 5000);
            }
        }

        // アプリケーション初期化
        document.addEventListener('DOMContentLoaded', () => {
            new AdminLogin();
        });
    </script>
</body>
</html>
